<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container{
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 300px;
            text-align: center;
        }
        input{
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }
        .password-box{
            position: relative;
        }
        .password-box span{
            position: absolute;
            right: 15px;
            top: 15px;
            cursor: pointer;
        }
        button{
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover{
            background: #5a67d8;
        }
        #message{
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <input type="text" placeholder="Username" id="username">
        <div class="password-box">
            <input type="password" placeholder="Password" id="password">
            <span onclick="togglePassword()"></span>
        </div>
        <button onclick="login()">Login</button>
        <p id="message"></p>
    </div>
</body>
</html>
