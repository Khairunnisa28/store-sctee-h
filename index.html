<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luné Crème</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--Navbar-->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                Luné Crème
            </a>
            <div class="d-flex">
                <button
                class="btn btn-light me-2" 
                onclick="loadCart()" 
                data-bs-toggle="modal" 
                data-bs-target="#cartModal">
                Cart
                </button>
                
                <button
                class="btn btn-danger" 
                onclick="logout()"
                >Logout</button>
            </div>
        </div>
    </nav>
    
    <!--Hero Section-->
    <section class="hero">
        <div class="container text-center">
            <h1 class="display-3 fw-bold">Luné Crème</h1>
            <p class="lead">
                The Sweetness of Moments, The Softness of Memories.
            </p>
        </div>
    </section>
    <section class="container my-5">
        <h2 class="text-center mb-4">Our Products</h2>
        <div id="products" class="row">
            <!-- Products will be displayed here -->
        </div>
    </section>

    <!--Cart Modal-->
    <div class="modal fade" id="cartModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    Shopping Cart
                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body">
                <div id="cart"></div>
            </div>

            <div class="modal-footer">
                <button
                    class="btn btn-success"
                    onclick="checkout()">
                    Checkout
                </button>
            </div>

        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    <script src="product.js"></script>
</body>
</html>
